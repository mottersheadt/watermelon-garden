<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Watermelon Garden</title>
<style>
  :root {
    --sky-top: #a4e4ff;
    --sky-bottom: #fff2b5;
    --grass: #82d35f;
    --grass-dark: #4f9a39;
    --soil: #8d5b2c;
    --soil-dark: #6a3f18;
    --leaf: #33a64f;
    --leaf-light: #7ce084;
    --card: rgba(255, 248, 232, 0.93);
    --ink: #173125;
    --shadow: rgba(23, 49, 37, 0.18);
  }

  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
  }

  html,
  body {
    margin: 0;
    min-height: 100%;
    overflow: hidden;
    touch-action: manipulation;
    -webkit-touch-callout: none;
  }

  body {
    font-family: "Trebuchet MS", "Verdana", sans-serif;
    color: var(--ink);
    background:
      radial-gradient(circle at 18% 14%, rgba(255,255,255,0.52), transparent 18%),
      linear-gradient(180deg, var(--sky-top), var(--sky-bottom) 56%, #a2e576 57%, var(--grass) 100%);
  }

  .game {
    max-width: 1080px;
    min-height: 100vh;
    margin: 0 auto;
    padding: 10px;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 8px;
  }

  .title-card,
  .score-card,
  .message {
    background: var(--card);
    border-radius: 22px;
    box-shadow: 0 12px 24px var(--shadow);
  }

  .title-card {
    padding: 12px 14px;
    text-align: center;
  }

  h1 {
    margin: 0;
    font-size: clamp(2rem, 4vw, 3.5rem);
    line-height: 0.95;
    color: #166534;
  }

  .subtitle {
    margin: 6px 0 0;
    font-size: clamp(1rem, 2vw, 1.1rem);
    font-weight: 700;
  }

  .hud {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .score-card {
    padding: 10px 14px;
    text-align: center;
    font-weight: 800;
  }

  .score-card strong {
    display: block;
    margin-top: 2px;
    font-size: 1.8rem;
    color: #145625;
  }

  .scene {
    position: relative;
    min-height: 660px;
    overflow: hidden;
    border-radius: 32px;
    box-shadow: 0 24px 50px var(--shadow);
    background:
      radial-gradient(circle at 84% 18%, rgba(255,255,255,0.74), transparent 16%),
      linear-gradient(180deg, rgba(255,255,255,0.2), transparent 24%),
      linear-gradient(180deg, transparent 58%, rgba(40, 130, 40, 0.16) 100%);
  }

  .grass {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 46%;
    background: linear-gradient(180deg, #92de69, var(--grass-dark));
  }

  .sun,
  .cloud,
  .bird,
  .bucket,
  .seed,
  .melon {
    border: 0;
    padding: 0;
    font: inherit;
    cursor: pointer;
    user-select: none;
  }

  .sun,
  .cloud,
  .bird,
  .bucket {
    touch-action: manipulation;
  }

  .seed,
  .melon {
    touch-action: none;
  }

  .sun {
    position: absolute;
    top: 20px;
    right: 24px;
    width: 92px;
    height: 92px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fff7b2, #ffd54d 60%, #f59e0b 100%);
    box-shadow: 0 0 0 12px rgba(255, 216, 84, 0.2), 0 0 28px rgba(255, 207, 66, 0.44);
  }

  .sun::before,
  .sun::after {
    content: "";
    position: absolute;
    background: #6b4200;
  }

  .sun::before {
    top: 30px;
    left: 24px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    box-shadow: 28px 0 0 #6b4200;
  }

  .sun::after {
    left: 34px;
    top: 50px;
    width: 24px;
    height: 10px;
    border-bottom: 4px solid #6b4200;
    border-radius: 0 0 18px 18px;
    background: transparent;
  }

  .cloud {
    position: absolute;
    top: 72px;
    left: 28px;
    width: 148px;
    height: 62px;
    border-radius: 999px;
    background: rgba(255,255,255,0.95);
    box-shadow: 34px -16px 0 12px rgba(255,255,255,0.95), 84px -6px 0 8px rgba(255,255,255,0.95);
    animation: drift 14s linear infinite;
  }

  .cloud .face {
    position: absolute;
    left: 56px;
    top: 20px;
    width: 38px;
    height: 18px;
  }

  .cloud .face::before,
  .cloud .face::after {
    content: "";
    position: absolute;
    top: 0;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #466273;
  }

  .cloud .face::before {
    left: 4px;
  }

  .cloud .face::after {
    right: 4px;
  }

  .cloud .face span {
    position: absolute;
    left: 50%;
    bottom: 0;
    width: 18px;
    height: 8px;
    border-bottom: 3px solid #466273;
    border-radius: 0 0 12px 12px;
    transform: translateX(-50%);
  }

  .bird {
    position: absolute;
    right: 150px;
    top: 126px;
    width: 128px;
    height: 104px;
    background: transparent;
    box-shadow: none;
  }

  .sun.party {
    animation: sun-bounce 0.45s ease;
  }

  .cloud.party {
    animation: cloud-jiggle 0.55s ease;
  }

  .bird.party {
    animation: bird-flap 0.6s ease;
  }

  .bird-body {
    position: absolute;
    inset: 10px 18px 10px 12px;
    border-radius: 52% 48% 46% 54%;
    background: linear-gradient(180deg, #ff94b6, #ff6c98 68%, #ea4b7d 100%);
    box-shadow: inset 0 10px 0 rgba(255,255,255,0.18), 0 12px 22px rgba(0,0,0,0.16);
  }

  .bird-belly {
    position: absolute;
    left: 34px;
    top: 34px;
    width: 46px;
    height: 38px;
    border-radius: 50%;
    background: rgba(255, 236, 208, 0.9);
  }

  .bird-wing {
    position: absolute;
    left: 26px;
    top: 28px;
    width: 50px;
    height: 36px;
    border-radius: 52% 48% 54% 46%;
    background: linear-gradient(180deg, #ff6b99, #e94178);
    transform-origin: right center;
  }

  .bird-tail {
    position: absolute;
    left: 8px;
    top: 40px;
    width: 28px;
    height: 24px;
    background: linear-gradient(180deg, #ff7aa6, #eb4a7c);
    clip-path: polygon(100% 50%, 0 0, 0 100%);
  }

  .bird-beak {
    position: absolute;
    right: 0;
    top: 42px;
    width: 0;
    height: 0;
    border-left: 26px solid #ffbb3c;
    border-top: 12px solid transparent;
    border-bottom: 12px solid transparent;
  }

  .bird-eye {
    position: absolute;
    left: 76px;
    top: 34px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #1f2130;
    box-shadow: -2px -2px 0 rgba(255,255,255,0.25) inset;
  }

  .bird-eye::after {
    content: "";
    position: absolute;
    right: 1px;
    top: 1px;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: white;
  }

  .bird-cheek {
    position: absolute;
    left: 68px;
    top: 48px;
    width: 14px;
    height: 10px;
    border-radius: 50%;
    background: rgba(255, 180, 190, 0.75);
  }

  .bird-mouth {
    position: absolute;
    left: 72px;
    top: 60px;
    width: 18px;
    height: 8px;
    border-bottom: 3px solid #b4315d;
    border-radius: 0 0 14px 14px;
  }

  .bird-legs {
    position: absolute;
    left: 48px;
    bottom: 0;
    width: 30px;
    height: 18px;
    border-bottom: 4px solid #ffbb3c;
    border-left: 4px solid transparent;
    border-right: 4px solid transparent;
  }

  .bird.party .bird-wing {
    animation: wing-flutter 0.35s ease 2;
  }

  .patch-zone {
    position: absolute;
    left: 50%;
    bottom: 218px;
    width: min(84vw, 420px);
    height: 280px;
    transform: translateX(-50%);
    border-radius: 40px;
    border: 5px dashed rgba(255,255,255,0.4);
    transition: transform 0.12s ease, border-color 0.12s ease, background 0.12s ease;
  }

  .patch-zone.active {
    transform: translateX(-50%) scale(1.03);
    border-color: rgba(255,255,255,0.84);
    background: rgba(255,255,255,0.08);
  }

  .patch {
    position: absolute;
    left: 50%;
    bottom: 180px;
    width: min(82vw, 370px);
    height: 150px;
    transform: translateX(-50%);
    border-radius: 50%;
    background: radial-gradient(circle at 50% 30%, #aa7037, var(--soil) 64%, var(--soil-dark) 100%);
    box-shadow: inset 0 10px 14px rgba(255,255,255,0.12);
  }

  .planted-seeds {
    position: absolute;
    left: 50%;
    bottom: 258px;
    width: 260px;
    height: 90px;
    transform: translateX(-50%);
  }

  .planted-seed {
    position: absolute;
    width: 18px;
    height: 24px;
    border-radius: 999px;
    background: linear-gradient(180deg, #5b3818, #2d1808);
    opacity: 0;
    transition: opacity 0.18s ease, transform 0.18s ease;
  }

  .planted-seed.show {
    opacity: 1;
    transform: translateY(-4px);
  }

  .plant-area {
    position: absolute;
    left: 50%;
    bottom: 292px;
    width: min(80vw, 390px);
    height: 280px;
    transform: translateX(-50%);
  }

  .plant-slot {
    position: absolute;
    width: 92px;
    height: 200px;
    transform: translateX(-50%);
  }

  .plant-slot .vine {
    position: absolute;
    left: 50%;
    bottom: 10px;
    width: 10px;
    height: 0;
    transform: translateX(-50%);
    border-radius: 999px;
    background: linear-gradient(180deg, #58d36b, #218844);
    transition: height 0.25s ease;
  }

  .plant-slot .leaf {
    position: absolute;
    width: 34px;
    height: 20px;
    border-radius: 40px 40px 0 40px;
    background: linear-gradient(180deg, var(--leaf-light), var(--leaf));
    opacity: 0;
    transition: opacity 0.2s ease;
  }

  .plant-slot .leaf.left {
    left: 10px;
    bottom: 74px;
    transform: rotate(-18deg);
  }

  .plant-slot .leaf.right {
    right: 10px;
    bottom: 100px;
    transform: scaleX(-1) rotate(-18deg);
  }

  .plant-slot .melon {
    position: absolute;
    left: 50%;
    bottom: 30px;
    width: 58px;
    height: 58px;
    transform: translateX(-50%) scale(0);
    border-radius: 46% 54% 48% 52%;
    background:
      repeating-linear-gradient(90deg, #47b256 0 10px, #1c7432 10px 15px, #87e28a 15px 20px);
    box-shadow: inset 0 10px 0 rgba(255,255,255,0.18), 0 12px 18px rgba(23,49,37,0.16);
    transition: width 0.22s ease, height 0.22s ease, transform 0.22s ease;
    overflow: visible;
  }

  .melon .melon-stem,
  .melon .melon-face,
  .melon .melon-highlight,
  .melon .melon-blush {
    position: absolute;
  }

  .melon .melon-stem {
    top: -10px;
    left: 50%;
    width: 14px;
    height: 20px;
    border-radius: 12px;
    background: linear-gradient(180deg, #3ea24d, #206c33);
    transform: translateX(-50%);
  }

  .melon .melon-stem::after {
    content: "";
    position: absolute;
    top: 2px;
    left: 8px;
    width: 16px;
    height: 10px;
    border-top: 3px solid #2f8f45;
    border-radius: 50%;
    transform: rotate(18deg);
  }

  .melon .melon-highlight {
    top: 14%;
    left: 18%;
    width: 18%;
    height: 22%;
    border-radius: 50%;
    background: rgba(255,255,255,0.18);
  }

  .melon .melon-face {
    left: 50%;
    top: 28%;
    width: 40%;
    height: 32%;
    transform: translateX(-50%);
  }

  .melon .melon-face::before,
  .melon .melon-face::after {
    content: "";
    position: absolute;
    top: 10%;
    width: 10%;
    height: 12%;
    border-radius: 50%;
    background: #173125;
  }

  .melon .melon-face::before {
    left: 16%;
  }

  .melon .melon-face::after {
    right: 16%;
  }

  .melon .melon-face span {
    position: absolute;
    left: 50%;
    bottom: 0;
    width: 42%;
    height: 18%;
    border-bottom: 4px solid #173125;
    border-radius: 0 0 16px 16px;
    transform: translateX(-50%);
  }

  .melon .melon-blush {
    left: 50%;
    top: 50%;
    width: 62%;
    height: 16%;
    transform: translateX(-50%);
  }

  .melon .melon-blush::before,
  .melon .melon-blush::after {
    content: "";
    position: absolute;
    width: 18%;
    height: 100%;
    border-radius: 50%;
    background: rgba(255, 183, 193, 0.5);
  }

  .melon .melon-blush::before {
    left: 0;
  }

  .melon .melon-blush::after {
    right: 0;
  }

  .melon.face-wink .melon-face::before {
    width: 14%;
    height: 4%;
    top: 14%;
    border-radius: 999px;
  }

  .melon.face-wow .melon-face span {
    width: 18%;
    height: 24%;
    border: 4px solid #173125;
    border-radius: 50%;
    border-bottom-width: 4px;
    background: transparent;
  }

  .melon.face-grin .melon-face span {
    width: 52%;
  }

  .melon.style-2 {
    background:
      repeating-linear-gradient(90deg, #5bc561 0 8px, #267b37 8px 12px, #9af09b 12px 16px);
  }

  .melon.style-3 {
    background:
      repeating-linear-gradient(90deg, #48ae57 0 6px, #1d7432 6px 11px, #7adf82 11px 18px);
  }

  .melon.style-4 {
    background:
      repeating-linear-gradient(90deg, #60bf64 0 12px, #237937 12px 16px, #93ea93 16px 20px);
  }

  .melon.shape-tall {
    border-radius: 44% 56% 50% 50%;
  }

  .melon.shape-flat {
    border-radius: 52% 48% 46% 46%;
  }

  .melon.shape-lumpy {
    border-radius: 43% 57% 46% 54%;
  }

  .melon.show {
    transform: translateX(-50%) scale(1);
    animation: bob 1s ease-in-out infinite;
  }

  .melon.picked {
    opacity: 0.18;
    transform: translateX(-50%) scale(0);
    animation: none;
    pointer-events: none;
  }

  .bucket {
    position: absolute;
    right: 20px;
    bottom: 26px;
    width: 200px;
    min-height: 210px;
    padding: 14px;
    border-radius: 26px;
    background: linear-gradient(180deg, #d59d58, #9b5e20);
    border: 6px solid #7a4215;
    box-shadow: 0 12px 24px rgba(0,0,0,0.15);
  }

  .bucket::before {
    content: "";
    position: absolute;
    left: 28px;
    right: 28px;
    top: -42px;
    height: 46px;
    border: 7px solid #7a4215;
    border-bottom: 0;
    border-radius: 38px 38px 0 0;
  }

  .bucket.active {
    transform: scale(1.03);
  }

  .bucket.party {
    animation: bucket-chomp 0.45s ease;
  }

  .bucket-title {
    display: block;
    margin-bottom: 10px;
    text-align: center;
    font-size: 1.05rem;
    font-weight: 900;
    color: #fff5dd;
    text-shadow: 0 2px 0 rgba(0,0,0,0.12);
  }

  .bucket-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .bucket-fruit,
  .bucket-empty {
    aspect-ratio: 1;
    border-radius: 50%;
    display: grid;
    place-items: center;
    font-size: 1.2rem;
  }

  .bucket-fruit {
    background:
      repeating-linear-gradient(90deg, #47b256 0 7px, #1c7432 7px 11px, #87e28a 11px 15px);
    border: 4px solid rgba(255,255,255,0.15);
    color: #173125;
  }

  .bucket-empty {
    background: rgba(255,255,255,0.15);
    border: 3px dashed rgba(255,255,255,0.22);
    color: rgba(255,255,255,0.4);
  }

  .seed-bank {
    position: absolute;
    left: 20px;
    bottom: 24px;
    width: 186px;
    padding: 12px;
    border-radius: 22px;
    background: rgba(255, 248, 232, 0.92);
    box-shadow: 0 12px 24px var(--shadow);
  }

  .seed-title {
    margin: 0 0 8px;
    text-align: center;
    font-size: 1rem;
    font-weight: 900;
    color: #14562a;
  }

  .seed-list {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .seed {
    position: relative;
    width: 100%;
    aspect-ratio: 1;
    border-radius: 999px;
    background: linear-gradient(180deg, #5b3818, #2d1808);
    box-shadow: inset 0 5px 0 rgba(255,255,255,0.12), 0 6px 10px rgba(0,0,0,0.12);
  }

  .seed.used {
    opacity: 0.16;
    transform: scale(0.85);
  }

  .seed.dragging,
  .melon.dragging {
    opacity: 0.7;
  }

  .drag-ghost {
    position: fixed;
    z-index: 30;
    pointer-events: none;
    width: 90px;
    height: 90px;
    display: grid;
    place-items: center;
    font-size: 2.7rem;
    transform: translate(-50%, -50%);
    filter: drop-shadow(0 10px 12px rgba(0,0,0,0.18));
  }

  .burst,
  .song-notes {
    position: absolute;
    pointer-events: none;
    opacity: 0;
    font-weight: 900;
  }

  .burst {
    left: 50%;
    bottom: 520px;
    transform: translateX(-50%);
    font-size: 2rem;
    color: white;
    text-shadow: 0 4px 10px rgba(0,0,0,0.18);
  }

  .song-notes {
    right: 150px;
    top: 108px;
    font-size: 2rem;
  }

  .rain-drop {
    position: absolute;
    width: 10px;
    height: 28px;
    border-radius: 999px;
    background: linear-gradient(180deg, rgba(255,255,255,0.15), rgba(25,144,221,0.95));
    animation: rain-fall 0.8s linear forwards;
    pointer-events: none;
  }

  .message {
    padding: 12px 14px;
    min-height: 54px;
    text-align: center;
    font-size: clamp(1rem, 2vw, 1.12rem);
    font-weight: 800;
  }

  .celebration {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    background: rgba(23, 49, 37, 0.28);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.18s ease;
    z-index: 20;
  }

  .celebration.show {
    opacity: 1;
  }

  .celebration-card {
    width: min(88vw, 360px);
    padding: 18px 18px 16px;
    border-radius: 26px;
    background: rgba(255, 248, 232, 0.96);
    box-shadow: 0 18px 34px rgba(0, 0, 0, 0.18);
    text-align: center;
  }

  .celebration-card strong {
    display: block;
    font-size: 2rem;
    color: #166534;
  }

  .celebration-card span {
    display: block;
    margin-top: 6px;
    font-size: 1.05rem;
    font-weight: 800;
  }

  .helper {
    position: absolute;
    left: 26px;
    top: 168px;
    width: 86px;
    height: 72px;
    border: 0;
    padding: 0;
    background: transparent;
    cursor: pointer;
    opacity: 0;
    pointer-events: none;
    transform: scale(0.8);
    transition: opacity 0.18s ease, transform 0.18s ease;
  }

  .helper.show {
    opacity: 1;
    pointer-events: auto;
    transform: scale(1);
  }

  .helper-body {
    position: absolute;
    left: 20px;
    top: 20px;
    width: 44px;
    height: 34px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #ff7a7a, #e11d48 72%);
    box-shadow: 0 10px 18px rgba(0,0,0,0.15);
  }

  .helper-body::before {
    content: "";
    position: absolute;
    left: 50%;
    top: 0;
    bottom: 0;
    width: 4px;
    background: #1f2130;
    transform: translateX(-50%);
  }

  .helper-dot,
  .helper-head {
    position: absolute;
    background: #1f2130;
    border-radius: 50%;
  }

  .helper-dot.dot-1 { left: 8px; top: 8px; width: 8px; height: 8px; }
  .helper-dot.dot-2 { right: 8px; top: 10px; width: 7px; height: 7px; }
  .helper-dot.dot-3 { left: 12px; bottom: 8px; width: 6px; height: 6px; }
  .helper-dot.dot-4 { right: 10px; bottom: 8px; width: 8px; height: 8px; }
  .helper-head {
    left: 8px;
    top: 24px;
    width: 18px;
    height: 18px;
  }

  .helper-head::before,
  .helper-head::after {
    content: "";
    position: absolute;
    top: -8px;
    width: 2px;
    height: 10px;
    background: #1f2130;
  }

  .helper-head::before {
    left: 5px;
    transform: rotate(-18deg);
  }

  .helper-head::after {
    right: 5px;
    transform: rotate(18deg);
  }

  .confetti-piece {
    position: absolute;
    width: 12px;
    height: 18px;
    border-radius: 4px;
    pointer-events: none;
    animation: confetti-fall 1.3s linear forwards;
  }

  @keyframes drift {
    from { transform: translateX(0); }
    to { transform: translateX(180px); }
  }

  @keyframes bob {
    0%, 100% { transform: scale(1) translateY(0); }
    50% { transform: scale(1.04) translateY(-10px); }
  }

  @keyframes rain-fall {
    0% { transform: translateY(-24px); opacity: 0; }

<script>
  const MAX_SEEDS = 6;
  const SLOT_POSITIONS = [
    { left: 72, top: 126 },
    { left: 196, top: 126 },
    { left: 320, top: 126 },
    { left: 72, top: 40 },
    { left: 196, top: 34 },
    { left: 320, top: 40 }
  ];

  const state = {
    planted: 0,
    watered: false,
    sunned: false,
    sung: 0,
    score: 0,
    bucket: [],
    personalities: [],
    helperReady: false,
    harvestedThisRound: [],
    usedSeeds: [],
    dragging: null,
    ghost: null,
    pointerId: null,
    audioContext: null,
    audioReady: false
  };

  const scoreEl = document.getElementById("score");
  const needEl = document.getElementById("need");
  const messageEl = document.getElementById("message");
  const sceneEl = document.getElementById("scene");
  const patchZoneEl = document.getElementById("patchZone");
  const bucketBtn = document.getElementById("bucketBtn");
  const cloudBtn = document.getElementById("cloudBtn");
  const sunBtn = document.getElementById("sunBtn");
  const birdBtn = document.getElementById("birdBtn");
  const helperBtn = document.getElementById("helperBtn");
  const bucketGridEl = document.getElementById("bucketGrid");
  const celebrationEl = document.getElementById("celebration");
  const celebrationTitleEl = document.getElementById("celebrationTitle");
  const celebrationTextEl = document.getElementById("celebrationText");
  const plantedSeedEls = [...document.querySelectorAll(".planted-seed")];
  const burstEl = document.getElementById("burst");
  const songNotesEl = document.getElementById("songNotes");
  const seedButtons = [...document.querySelectorAll(".seed")];
  const melonButtons = [...document.querySelectorAll(".melon")];
  const plantSlots = [...document.querySelectorAll(".plant-slot")].map((slot) => ({
    el: slot,
    vine: slot.querySelector(".vine"),
    leafLeft: slot.querySelector(".leaf.left"),
    leafRight: slot.querySelector(".leaf.right"),
    melon: slot.querySelector(".melon")
  }));

  let lastTouchEnd = 0;
  document.addEventListener("gesturestart", (event) => {
    event.preventDefault();
  }, { passive: false });
  document.addEventListener("dblclick", (event) => {
    event.preventDefault();
  }, { passive: false });
  document.addEventListener("touchend", (event) => {
    const now = Date.now();
    if (now - lastTouchEnd <= 300) {
      event.preventDefault();
    }
    lastTouchEnd = now;
  }, { passive: false });

  const melonNames = ["Momo", "Bubbles", "Wiggles", "Pickles", "Nibbles", "Boop"];
  const melonFaces = ["face-grin", "face-wink", "face-wow"];
  const melonStyles = ["style-1", "style-2", "style-3", "style-4"];
  const melonShapes = ["shape-tall", "shape-flat", "shape-lumpy"];

  function randomItem(items) {
    return items[Math.floor(Math.random() * items.length)];
  }

  function refreshMelonPersonalities() {
    state.personalities = Array.from({ length: MAX_SEEDS }, (_, index) => ({
      name: `${randomItem(melonNames)} ${index + 1}`,
      face: randomItem(melonFaces),
      style: randomItem(melonStyles),
      shape: randomItem(melonShapes),
      voice: 320 + Math.floor(Math.random() * 260)
    }));
  }

  function animateCharacter(element, className) {
    element.classList.remove(className);
    void element.offsetWidth;
    element.classList.add(className);
    setTimeout(() => element.classList.remove(className), 650);
  }

  function getAudioContext() {
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if (!AudioCtx) {
      return null;
    }
    if (!state.audioContext) {
      state.audioContext = new AudioCtx();
    }
    if (state.audioContext.state === "suspended") {
      state.audioContext.resume().catch(() => {});
    }
    return state.audioContext;
  }

  function primeAudio() {
    const ctx = getAudioContext();
    if (!ctx || state.audioReady) {
      return;
    }

    const unlock = () => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "sine";
      osc.frequency.setValueAtTime(440, ctx.currentTime);
      gain.gain.setValueAtTime(0.00001, ctx.currentTime);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.01);
      state.audioReady = true;
    };

    if (ctx.state === "suspended") {
      ctx.resume().then(unlock).catch(() => {});
    } else {
      unlock();
    }
  }

  function playSound(type, customTones) {
    const ctx = getAudioContext();
    if (!ctx || !state.audioReady) {
      return;
    }

    const now = ctx.currentTime;
    const tonesMap = {
      seed: [420, 520],
      cloud: [260, 220, 190],
      sun: [520, 640],
      bird: [660, 740, 880],
      melon: [380, 520, 680],
      bucket: [250, 190],
      error: [180],
      drop: [300, 360]
    };

    const tones = customTones || tonesMap[type];
    tones.forEach((freq, index) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type =
        type === "cloud" ? "sine" :
        type === "bird" ? "triangle" :
        type === "error" ? "sawtooth" : "square";
      osc.frequency.setValueAtTime(freq, now + index * 0.05);
      gain.gain.setValueAtTime(0.0001, now + index * 0.05);
      gain.gain.linearRampToValueAtTime(0.08, now + index * 0.05 + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + index * 0.05 + 0.22);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(now + index * 0.05);
      osc.stop(now + index * 0.05 + 0.24);
    });
  }

  const audioUnlockEvents = ["pointerdown", "touchstart", "click"];
  audioUnlockEvents.forEach((eventName) => {
    document.addEventListener(eventName, primeAudio, { passive: true });
  });

  function setMessage(text) {
    messageEl.textContent = text;
  }

  function burst(text) {
    burstEl.textContent = text;
    burstEl.animate(
      [
        { opacity: 0, transform: "translateX(-50%) translateY(12px) scale(0.7)" },
        { opacity: 1, transform: "translateX(-50%) translateY(-8px) scale(1)" },
        { opacity: 0, transform: "translateX(-50%) translateY(-34px) scale(1.05)" }
      ],
      { duration: 700, easing: "ease-out" }
    );
  }

  function singNotes() {
    songNotesEl.animate(
      [
        { opacity: 0, transform: "translateY(8px) scale(0.8)" },
        { opacity: 1, transform: "translateY(-6px) scale(1)" },
        { opacity: 0, transform: "translateY(-28px) scale(1.06)" }
      ],
      { duration: 800, easing: "ease-out" }
    );
  }

  function createConfetti() {
    const colors = ["#ef4444", "#f59e0b", "#22c55e", "#38bdf8", "#f472b6"];
    for (let i = 0; i < 20; i += 1) {
      const piece = document.createElement("div");
      piece.className = "confetti-piece";
      piece.style.left = `${20 + Math.random() * 60}%`;
      piece.style.top = `${16 + Math.random() * 10}%`;
      piece.style.background = colors[i % colors.length];
      piece.style.animationDelay = `${Math.random() * 0.12}s`;
      sceneEl.appendChild(piece);
      setTimeout(() => piece.remove(), 1400);
    }
  }

  function showCelebration() {
    celebrationTitleEl.textContent = "Picnic Time!";
    celebrationTextEl.textContent = `You picked ${state.planted} funny watermelon${state.planted === 1 ? "" : "s"}!`;
    celebrationEl.classList.add("show");
    createConfetti();
    playSound("bucket", [520, 660, 784, 880]);
    setTimeout(() => celebrationEl.classList.remove("show"), 1400);
  }

  function maybeShowHelper() {
    if (!state.helperReady && state.sunned && Math.random() < 0.55) {
      state.helperReady = true;
      helperBtn.classList.add("show");
      setMessage("A ladybug helper popped in. Tap it for a bonus grow.");
    }
  }

  function rainBurst() {
    for (let i = 0; i < 14; i += 1) {
      const drop = document.createElement("div");
      drop.className = "rain-drop";
      drop.style.left = `${34 + Math.random() * 34}%`;
      drop.style.top = "110px";
      drop.style.animationDelay = `${Math.random() * 0.12}s`;
      sceneEl.appendChild(drop);
      setTimeout(() => drop.remove(), 850);
    }
  }

  function getNeedText() {
    if (state.planted === 0) {
      return "Drag seeds to the patch";
    }
    if (!state.watered) {
      return "Click the cloud";
    }
    if (!state.sunned) {
      return "Click the sun";
    }
    if (state.sung === 0) {
      return "Click the bird";
    }
    return `${state.planted - state.harvestedThisRound.length} melons left to pick`;
  }

  function getMelonSize() {
    if (state.sung === 0) {
      return 58;
    }
    return Math.min(190, 72 + state.sung * 16);
  }

  function updateScene() {
    scoreEl.textContent = String(state.score);
    needEl.textContent = getNeedText();

    seedButtons.forEach((seed, index) => {
      seed.classList.toggle("used", state.usedSeeds.includes(index));
    });

    plantedSeedEls.forEach((seed, index) => {
      seed.classList.toggle("show", index < state.planted);
    });

    const melonSize = getMelonSize();
    plantSlots.forEach((slot, index) => {
      const pos = SLOT_POSITIONS[index];
      slot.el.style.left = `${pos.left}px`;
      slot.el.style.top = `${pos.top}px`;
      slot.vine.style.height = state.watered && index < state.planted ? `${64 + index * 5}px` : "0";
      slot.leafLeft.style.opacity = state.sunned && index < state.planted ? "1" : "0";
      slot.leafRight.style.opacity = state.sunned && index < state.planted ? "1" : "0";
      slot.melon.style.width = `${melonSize + (index % 3) * 4}px`;
      slot.melon.style.height = `${melonSize + (index % 2) * 6}px`;
      slot.melon.style.bottom = `${28 + (index % 2) * 6}px`;
      slot.melon.classList.remove("face-grin", "face-wink", "face-wow", "style-1", "style-2", "style-3", "style-4", "shape-tall", "shape-flat", "shape-lumpy");
      slot.melon.classList.add(state.personalities[index].face, state.personalities[index].style, state.personalities[index].shape);
      slot.melon.setAttribute("aria-label", state.personalities[index].name);
      const visible = state.sung > 0 && index < state.planted && !state.harvestedThisRound.includes(index);
      slot.melon.classList.toggle("show", visible);
      slot.melon.classList.toggle("picked", state.harvestedThisRound.includes(index));
    });
  }

  function renderBucket() {
    bucketGridEl.innerHTML = "";
    const shown = state.bucket.slice(-12);
    shown.forEach((size) => {
      const fruit = document.createElement("span");
      fruit.className = "bucket-fruit";
      fruit.textContent = size >= 120 ? "🍉" : "🙂";
      fruit.style.transform = `scale(${Math.max(0.72, Math.min(1.08, size / 120))})`;
      bucketGridEl.appendChild(fruit);
    });
    for (let i = shown.length; i < 12; i += 1) {
      const empty = document.createElement("span");
      empty.className = "bucket-empty";
      empty.textContent = "·";
      bucketGridEl.appendChild(empty);
    }
  }

  function resetRound(message = "Drag seeds onto the patch to start planting.") {
    state.planted = 0;
    state.watered = false;
    state.sunned = false;
    state.sung = 0;
    refreshMelonPersonalities();
    state.helperReady = false;
    helperBtn.classList.remove("show");
    state.harvestedThisRound = [];
    state.usedSeeds = [];
    setMessage(message);
    updateScene();
  }

  function pointInside(event, element) {
    const rect = element.getBoundingClientRect();
    return event.clientX >= rect.left &&
      event.clientX <= rect.right &&
      event.clientY >= rect.top &&
      event.clientY <= rect.bottom;
  }

  function moveGhost(event) {
    if (!state.ghost) {
      return;
    }
    state.ghost.style.left = `${event.clientX}px`;
    state.ghost.style.top = `${event.clientY}px`;
  }

  function cleanupDrag() {
    patchZoneEl.classList.remove("active");
    bucketBtn.classList.remove("active");
    if (state.dragging?.sourceEl) {
      state.dragging.sourceEl.classList.remove("dragging");
      if (state.pointerId !== null && state.dragging.sourceEl.hasPointerCapture?.(state.pointerId)) {
        state.dragging.sourceEl.releasePointerCapture(state.pointerId);
      }
    }
    if (state.ghost) {
      state.ghost.remove();
    }
    state.dragging = null;
    state.ghost = null;
    state.pointerId = null;
  }

  function startDrag(event, type, index, sourceEl, emoji) {
    cleanupDrag();
    playSound(type === "seed" ? "seed" : "melon");
    state.pointerId = event.pointerId;
    state.dragging = { type, index, sourceEl };
    sourceEl.classList.add("dragging");

    const ghost = document.createElement("div");
    ghost.className = "drag-ghost";
    ghost.textContent = emoji;
    document.body.appendChild(ghost);
    state.ghost = ghost;
    moveGhost(event);

    sourceEl.setPointerCapture(event.pointerId);
    if (type === "seed") {
      patchZoneEl.classList.add("active");
    } else {
      bucketBtn.classList.add("active");
    }
  }

  function finishSeedDrop(seedIndex) {
    if (state.usedSeeds.includes(seedIndex)) {
      playSound("error");
      setMessage("That seed is already planted.");
      burst("OOPS");
      return;
    }

    state.usedSeeds.push(seedIndex);
    state.planted += 1;
    playSound("drop");
    burst("PLOP!");
    updateScene();

    if (state.planted === 1) {
      setMessage("Nice. Plant more seeds or move on when you are ready.");
    } else {
      setMessage(`${state.planted} seeds planted. That means ${state.planted} watermelons will grow.`);
    }
  }

  function finishMelonDrop(melonIndex) {
    if (state.harvestedThisRound.includes(melonIndex)) {
      return;
    }
    const size = getMelonSize();
    const personality = state.personalities[melonIndex];
    state.harvestedThisRound.push(melonIndex);
    state.score += 1;
    state.bucket.push(size);
    animateCharacter(bucketBtn, "party");
    playSound("melon", [personality.voice, personality.voice + 90, personality.voice + 180]);
    renderBucket();
    updateScene();

    const left = state.planted - state.harvestedThisRound.length;
    if (left === 0) {
      burst("YUM!");
      showCelebration();
      setMessage(`All picked. ${personality.name} and friends are ready for another round.`);
      setTimeout(() => {
        resetRound("Drag seeds onto the patch for the next round.");
      }, 500);
    } else {
      burst("PICK!");
      setMessage(`${personality.name} jumped in. ${left} watermelon${left === 1 ? "" : "s"} left.`);
    }
  }

  function endDrag(event) {
    if (!state.dragging) {
      return;
    }

    const { type, index } = state.dragging;
    if (type === "seed") {
      if (pointInside(event, patchZoneEl)) {
        finishSeedDrop(index);
      } else {
        playSound("error");
        setMessage("Drop the seed on the patch.");
      }
    } else if (pointInside(event, bucketBtn)) {
      finishMelonDrop(index);
    } else {
      playSound("error");
      setMessage("Drag the watermelon into the bucket.");
    }

    cleanupDrag();
  }

  seedButtons.forEach((seed, index) => {
    seed.addEventListener("pointerdown", (event) => {
      if (state.usedSeeds.includes(index)) {
        playSound("error");
        setMessage("That seed is already planted.");
        return;
      }
      startDrag(event, "seed", index, seed, "🌱");
    });
  });

  melonButtons.forEach((melon, index) => {
    melon.addEventListener("pointerdown", (event) => {
      if (state.sung === 0 || index >= state.planted || state.harvestedThisRound.includes(index)) {
        playSound("error");
        setMessage("Grow the watermelons first.");
        return;
      }
      startDrag(event, "melon", index, melon, "🍉");
    });
  });

  window.addEventListener("pointermove", (event) => {
    if (state.pointerId === event.pointerId) {
      moveGhost(event);
    }
  });

  window.addEventListener("pointerup", (event) => {
    if (state.pointerId === event.pointerId) {
      endDrag(event);
    }
  });

  window.addEventListener("pointercancel", () => {
    cleanupDrag();
  });

  window.addEventListener("blur", cleanupDrag);
  document.addEventListener("visibilitychange", () => {
    if (document.hidden) {
      cleanupDrag();
    }
  });

  cloudBtn.addEventListener("click", () => {
    playSound("cloud");
    animateCharacter(cloudBtn, "party");
    if (state.planted === 0) {
      setMessage("Plant at least one seed first.");
      burst("WAIT!");
      return;
    }
    if (state.watered) {
      setMessage("The patch is already watered. Click the sun next.");
      burst("SPLASH!");
      return;
    }
    state.watered = true;
    rainBurst();
    updateScene();
    burst("SPLASH!");
    setMessage("Splash splash. The vine popped up. Now click the sun.");
  });

  sunBtn.addEventListener("click", () => {
    playSound("sun");
    animateCharacter(sunBtn, "party");
    if (!state.watered) {
      setMessage("The cloud goes first.");
      burst("WAIT!");
      return;
    }
    if (state.sunned) {
      setMessage("The patch is already sunny. Click the bird.");
      burst("SHINE!");
      return;
    }
    state.sunned = true;
    sunBtn.animate(
      [
        { transform: "scale(1)" },
        { transform: "scale(1.15)" },
        { transform: "scale(1)" }
      ],
      { duration: 420, easing: "ease-out" }
    );
    updateScene();
    maybeShowHelper();
    burst("SHINE!");
    setMessage("Warm sunshine. The leaves came out. Now click the bird.");
  });

  birdBtn.addEventListener("click", () => {
    playSound("bird");
    animateCharacter(birdBtn, "party");
    if (!state.sunned) {
      setMessage("The sun should shine before the bird sings.");
      burst("WAIT!");
      return;
    }
    state.sung += 1;
    singNotes();
    updateScene();
    if (state.sung === 1) {
      burst("GROW!");
      setMessage(`${state.planted} silly melons popped up. Drag each one into the bucket.`);
    } else {
      burst("BIGGER!");
      setMessage("The watermelons got bigger. Drag them out or keep singing.");
    }
  });

  helperBtn.addEventListener("click", () => {
    if (!state.helperReady) {
      return;
    }
    state.helperReady = false;
    helperBtn.classList.remove("show");
    animateCharacter(helperBtn, "show");
    playSound("bird", [740, 820, 920]);
    state.sung += 1;
    updateScene();
    createConfetti();
    burst("BONUS!");
    setMessage("Ladybug bonus. The melons got an extra boost!");
  });

  bucketBtn.addEventListener("click", () => {
    playSound("bucket");
    animateCharacter(bucketBtn, "party");
    if (state.bucket.length === 0) {
      setMessage("The bucket is empty. Grow some watermelons first.");
    } else {
      setMessage(`Your bucket has ${state.bucket.length} watermelon${state.bucket.length === 1 ? "" : "s"}.`);
    }
  });

  refreshMelonPersonalities();
  renderBucket();
  updateScene();
</script>
</body>
</html>
